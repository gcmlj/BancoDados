
<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <title>Cadastro de Funcionário</title>
    <style>
      body { font-family: Arial; margin: 20px; }
      input, select { margin-bottom: 10px; width: 100%; padding: 8px; }
      label { font-weight: bold; }
      button { padding: 10px 20px; }
    </style>
  </head>
  <body>
    <h2>Cadastro de Funcionário</h2>

    <form id="form">
      <label>Nome:</label>
      <input name="nome" required>

      <label>Nome de Guerra:</label>
      <input name="nomeDeGuerra">

      <label>Matrícula:</label>
      <input name="matricula">

      <label>Data de Admissão:</label>
      <input name="dataAdmissao" type="date">

      <label>CPF:</label>
      <input name="cpf">

      <label>RG:</label>
      <input name="rg">

      <label>Data de Nascimento:</label>
      <input name="dataNascimento" type="date">

      <label>Nome da Mãe:</label>
      <input name="nomeMae">

      <label>Nome do Pai:</label>
      <input name="nomePai">

      <label>Sexo:</label>
      <select name="sexo">
        <option value="Masculino">Masculino</option>
        <option value="Feminino">Feminino</option>
        <option value="Outro">Outro</option>
      </select>

      <label>Tipagem Sanguínea:</label>
      <input name="tipagemSanguinea">

      <label>Arquivo (PDF, JPG, etc):</label>
      <input type="file" id="fileInput" required>

      <br>
      <button type="submit">Enviar</button>
    </form>

    <p id="output"></p>

    <script>
      const form = document.getElementById('form');
      const output = document.getElementById('output');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const file = document.getElementById('fileInput').files[0];
        if (!file) {
          alert('Selecione um arquivo!');
          return;
        }

        const reader = new FileReader();
        reader.onload = async function() {
          const base64Data = reader.result.split(',')[1];

          const formData = new FormData(form);
          const params = new URLSearchParams();

          for (const [key, value] of formData.entries()) {
            params.append(key, value);
          }

          params.append('fileName', file.name);
          params.append('mimeType', file.type);
          params.append('fileData', base64Data);

          const url = 'https://script.google.com/macros/s/AKfycbxe9L5J_fDxfoA2_p6-kNQtqflGMdm1n8S-CRF7YRJtT_Wbo5lvFNgtu3C6vQbwqqOt/exec';

          output.innerText = 'Enviando...';

          try {
            const res = await fetch(url, {
              method: 'POST',
              body: params
            });

            const text = await res.text();
            output.innerText = text;
          } catch (err) {
            output.innerText = 'Erro: ' + err;
          }
        };
        reader.readAsDataURL(file);
      });
    </script>
  </body>
</html>
